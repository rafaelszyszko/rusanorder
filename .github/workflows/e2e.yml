name: E2E Tests

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:
    inputs:
      spec:
        description: 'Spec específico (opcional). Ex: cypress/e2e/01-auth.cy.js. Vazio = roda todos.'
        required: false
        default: ''

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Cypress E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rusanorder
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    env:
      # Backend
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: rusanorder
      DB_SSL: 'false'
      JWT_SECRET: ci-only-secret-not-used-in-prod-please-change
      JWT_EXPIRES_IN: 1d
      CORS_ORIGIN: http://localhost:5173
      PORT: 3000
      # Frontend (injetado no bundle em build time)
      VITE_API_URL: http://localhost:3000
      # Cypress
      CYPRESS_BASE_URL: http://localhost:5173
      CYPRESS_API_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json
            frontend/package-lock.json

      - name: Aplicar schema no MySQL
        # init.sql já contém todas as tabelas + seeds. As migrations 002/003
        # servem apenas para bancos legados; num ambiente fresco elas duplicam
        # os seeds e quebram com ERROR 1062 (duplicate entry).
        run: mysql -h 127.0.0.1 -P 3306 -uroot -proot rusanorder < database/init.sql

      - name: Instalar dependências (root, backend, frontend)
        run: |
          npm ci
          npm --prefix backend ci
          npm --prefix frontend ci

      - name: Build do frontend
        run: npm --prefix frontend run build

      - name: Subir backend em background
        run: |
          npm --prefix backend start > backend.log 2>&1 &
          echo $! > backend.pid
          npx --yes wait-on -t 60000 http://127.0.0.1:3000/health

      - name: Servir build do frontend em background
        run: |
          npm --prefix frontend exec -- vite preview --host 0.0.0.0 --port 5173 --strictPort > frontend.log 2>&1 &
          echo $! > frontend.pid
          npx --yes wait-on -t 60000 http://127.0.0.1:5173

      - name: Rodar Cypress
        uses: cypress-io/github-action@v6
        with:
          install: false
          spec: ${{ inputs.spec }}

      - name: Logs do backend (em caso de falha)
        if: failure()
        run: cat backend.log || true

      - name: Logs do frontend (em caso de falha)
        if: failure()
        run: cat frontend.log || true

      - name: Upload screenshots do Cypress
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore

      - name: Upload videos do Cypress
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore
